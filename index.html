<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My-Portfolio</title>
</head>
<body class="Index_Container">
    <header class="Container" id="i-header">
        <div class="Header_Container" id="profile-header_container">
            <div class="Header-Img_Container" id="bg-img_container"></div>
            <div class="Header-Img_Container" id="prof-img_container"></div>
            <div class="Header-Id_Container" id="name-id_container"></div>
        </div>
    </header>
    <nav class="Container" id="i-nav">
        <div class="Nav_Container" id="section-nav_container">
            <div class="Nav-Tool_Container"></div>
            <div class="Nav-Tool_Container"></div>
            <div class="Nav-Tool_Container"></div>
            <div class="Nav-Tool_Container"></div>
            <div class="Nav-Tool_Container"></div>
            <div class="Nav-Tool_Container"></div>
        </div>
    </nav>
    <main class="Container" id="i-main">
        <div class="Main_Container" id="content-main_container">
            <div class="Main-Content_Container" id="heading-content_container"></div>
            <section class="Section-Wrap_Container" id="i-section">
                <article class="Article-Content_Container" id="i-article"></article>
                <aside class="Aside-Content_Container" id="i-aside"></aside>
            </section>
        </div>
    </main>
    <footer class="Container" id="i-footer"></footer>
</body>
</html>
